name: CI

on:
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm
      - name: Install pinned Chrome (workaround for actions/runner-images#14169)
        # see https://github.com/actions/runner-images/issues/14169
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: '148.0.7778.167'
          install-dependencies: true
          install-chromedriver: true
      - name: yarn install, build, test and lint
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEWEBDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          yarn install --immutable
          yarn run lint
          yarn run test
          yarn run build

      - name: Configure AWS credentials
        if: github.actor != 'dependabot[bot]'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_S3_ASSETS_DEPLOY_ROLE }}
          aws-region: eu-west-1

      - name: Upload to CDN
        if: github.actor != 'dependabot[bot]'
        uses: ./.github/actions/cdn
        with:
          file: "dintero-checkout-web-sdk.umd.min.js"
          s3-bucket: ${{ secrets.S3_BUCKET }}
          s3-prefix: "pkg/checkout-web-sdk"
          set-as-latest: false
          update-github-release: false
