name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      packages: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org/"
          scope: "@dintero"
      - name: Install pinned Chrome (workaround for actions/runner-images#14169)
        # see https://github.com/actions/runner-images/issues/14169
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: '148.0.7778.167'
          install-dependencies: true
          install-chromedriver: true
      - name: Install dependencies, test and lint
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          CHROMEDRIVER_PATH: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: |
          yarn install --immutable
          yarn run lint
          yarn run test
          yarn run build
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn run semantic-release

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_S3_ASSETS_DEPLOY_ROLE }}
          aws-region: eu-west-1

      - name: Set version number
        run: echo "VERSION=$(npm pkg get version --workspaces=false | tr -d '"')" >> $GITHUB_ENV
        shell: bash

      - name: Upload to CDN
        uses: ./.github/actions/cdn
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          file: "dintero-checkout-web-sdk.umd.min.js"
          s3-bucket: ${{ secrets.S3_BUCKET }}
          s3-prefix: "pkg/checkout-web-sdk"
          set-as-latest: ${{ env.VERSION != '0.0.0-development' }}
          update-github-release: ${{ env.VERSION != '0.0.0-development' }}
