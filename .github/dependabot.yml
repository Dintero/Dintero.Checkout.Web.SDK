version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    groups:
      babel:
        patterns:
          - "@babel/*"
      semantic-release:
        patterns:
          - "@semantic-release/*"
          - "semantic-release"
      vitest-webdriverio:
        patterns:
          - "@vitest/*"
          - "vitest"
          - "webdriverio"
